name: "vprofile IAC"

on:
  push:
    branches:
      - main
      - stage
    paths:
      - "terraform/**"

  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"

  workflow_dispatch:

env:
  BUCKET_TF_STATE: ${{ secrets.BUCKET_TF_STATE }}
  AWS_REGION: us-west-2
  EKS_CLUSTER: vprofile-eks

jobs:
  terraform:
    name: Apply Terraform Changes
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: ./terraform

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.6.6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init --backend-config="bucket=${{ env.BUCKET_TF_STATE }}"

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -input=false tfplan

      - name: Show AWS Identity
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: aws sts get-caller-identity

      - name: Configure kubectl
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER

      - name: Verify Cluster Access
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          kubectl config current-context
          kubectl get nodes

      - name: Install NGINX Ingress Controller
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.15.1/deploy/static/provider/aws/deploy.yaml

      - name: Verify Ingress
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          kubectl get pods -n ingress-nginx